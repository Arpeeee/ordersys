services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: coffeedb
      POSTGRES_USER: taiwannick
      POSTGRES_PASSWORD: gogolee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taiwannick -d coffeedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_files:
